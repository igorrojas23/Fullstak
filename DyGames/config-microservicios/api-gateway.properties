spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# category-service
spring.cloud.gateway.routes[0].id=category-service
spring.cloud.gateway.routes[0].uri=lb://category-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/categorias/**

# auth-service
spring.cloud.gateway.routes[1].id=auth-service
spring.cloud.gateway.routes[1].uri=lb://auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/auth/**

# user-service
spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/usuarios/**

# game-service
spring.cloud.gateway.routes[3].id=game-service
spring.cloud.gateway.routes[3].uri=lb://game-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/juegos/**

# cart-service
spring.cloud.gateway.routes[4].id=cart-service
spring.cloud.gateway.routes[4].uri=lb://cart-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/carrito/**

# order-service
spring.cloud.gateway.routes[5].id=order-service
spring.cloud.gateway.routes[5].uri=lb://order-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/ordenes/**

# payment-service
spring.cloud.gateway.routes[6].id=payment-service
spring.cloud.gateway.routes[6].uri=lb://payment-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/pagos/**

# library-service
spring.cloud.gateway.routes[7].id=library-service
spring.cloud.gateway.routes[7].uri=lb://library-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/biblioteca/**

# review-service
spring.cloud.gateway.routes[8].id=review-service
spring.cloud.gateway.routes[8].uri=lb://review-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/resenas/**

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
